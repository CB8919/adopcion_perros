{% extends "index.html" %}

{% block content %}
<h2>🔍 Resultados</h2>

{% if perros %}
<table class="table">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Raza</th>
            <th>Edad</th>
            <th>Tamaño</th>
        </tr>
    </thead>
    <tbody>
        {% for perro in perros %}
        <tr>
            <td>{{ perro.nombre }}</td>
            <td>{{ perro.raza }}</td>
            <td>{{ perro.edad }}</td>
            <td>{{ perro.tamano }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No hay resultados.</p>
{% endif %}
{% endblock %}
